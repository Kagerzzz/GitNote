<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GitNote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #0e0f11;
  --surface:    #141618;
  --surface2:   #1c1f23;
  --surface3:   #23272e;
  --border:     #2a2f38;
  --border2:    #353c48;
  --accent:     #5b9cf6;
  --accent-dim: rgba(91,156,246,.12);
  --green:      #4ade80;
  --amber:      #fbbf24;
  --red:        #f87171;
  --text:       #dde3ed;
  --text-2:     #8b95a6;
  --text-3:     #4e5765;
  --mono:       'IBM Plex Mono', monospace;
  --serif:      'Fraunces', serif;
  --radius:     10px;
  --sidebar-w:  272px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 14px; line-height: 1.6; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

/* LOGIN */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 999;
}
.login-wrap { width: 400px; animation: fadeUp .4s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.login-header { margin-bottom: 32px; }
.login-logo { font-family: var(--serif); font-size: 28px; font-weight: 300; color: var(--text); letter-spacing: -0.5px; }
.login-logo em { font-style: italic; color: var(--accent); }
.login-sub { font-size: 12px; color: var(--text-3); margin-top: 6px; }
.login-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px;
  display: flex; flex-direction: column; gap: 16px;
}
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1.2px; }
.field input {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; color: var(--text); font-family: var(--mono); font-size: 13px;
  outline: none; transition: border-color .15s; width: 100%;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text-3); }
.btn-primary {
  background: var(--accent); color: #fff; border: none; border-radius: 8px;
  padding: 12px; font-family: var(--mono); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity .15s, transform .1s; width: 100%;
}
.btn-primary:hover { opacity: .88; }
.btn-primary:active { transform: scale(.99); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.login-err { font-size: 12px; color: var(--red); min-height: 16px; text-align: center; }

/* SHARE SCREEN */
#share-screen { display: none; flex-direction: column; height: 100vh; }
.share-bar {
  height: 50px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 12px; flex-shrink: 0;
}
.share-logo { font-family: var(--serif); font-size: 17px; font-weight: 300; font-style: italic; color: var(--accent); }
.share-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border2); color: var(--text-2); }
.share-pill.edit { border-color: var(--amber); color: var(--amber); }
.share-body { flex: 1; overflow-y: auto; padding: 48px 24px; max-width: 800px; margin: 0 auto; width: 100%; }

/* APP */
#app { display: none; height: 100vh; flex-direction: column; }
.topbar {
  height: 50px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0;
}
.topbar-logo { font-family: var(--serif); font-size: 18px; font-weight: 300; font-style: italic; color: var(--accent); margin-right: auto; }
.icon-btn {
  background: none; border: 1px solid transparent; color: var(--text-2);
  border-radius: 7px; padding: 5px 12px; font-family: var(--mono); font-size: 12px;
  cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px;
}
.icon-btn:hover { border-color: var(--border2); color: var(--text); }
.icon-btn.danger:hover { border-color: var(--red); color: var(--red); }
.workspace { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-top {
  padding: 12px 10px; border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
}
.search-wrap { flex: 1; position: relative; }
.search-wrap input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; padding: 7px 10px 7px 30px; color: var(--text);
  font-family: var(--mono); font-size: 12px; outline: none; transition: border-color .15s;
}
.search-wrap input:focus { border-color: var(--border2); }
.search-wrap input::placeholder { color: var(--text-3); }
.search-icon {
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  color: var(--text-3); font-size: 13px; pointer-events: none;
}
.btn-new-note {
  background: var(--accent-dim); border: 1px solid rgba(91,156,246,.3); color: var(--accent);
  border-radius: 7px; width: 32px; height: 32px; font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.btn-new-note:hover { background: rgba(91,156,246,.22); }
#note-list { flex: 1; overflow-y: auto; padding: 6px; }
.note-item {
  padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background .12s;
  display: flex; align-items: flex-start; gap: 8px; position: relative;
  border: 1px solid transparent; margin-bottom: 2px;
}
.note-item:hover { background: var(--surface2); }
.note-item.active { background: var(--surface2); border-color: var(--border); }
.note-item.active::before {
  content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
  width: 2px; background: var(--accent); border-radius: 2px;
}
.note-item-info { flex: 1; min-width: 0; }
.note-title {
  font-size: 13px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
}
.note-date { font-size: 11px; color: var(--text-3); }
.note-del {
  opacity: 0; background: none; border: none; color: var(--text-3);
  cursor: pointer; padding: 2px 5px; border-radius: 4px; font-size: 13px;
  transition: all .12s; flex-shrink: 0;
}
.note-item:hover .note-del { opacity: 1; }
.note-del:hover { color: var(--red); background: rgba(248,113,113,.1); }
.list-empty { padding: 32px 16px; text-align: center; color: var(--text-3); font-size: 12px; line-height: 1.8; }

/* EDITOR AREA */
#editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
#empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px; color: var(--text-3);
}
.empty-glyph { font-family: var(--serif); font-size: 56px; font-weight: 300; font-style: italic; color: var(--border2); line-height: 1; }
.empty-hint { font-size: 13px; }
#editor-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }

/* TOOLBAR */
.toolbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 2px;
  min-height: 46px; flex-wrap: wrap;
}
#note-title-inp {
  background: none; border: none; color: var(--text); font-family: var(--serif);
  font-size: 16px; font-weight: 300; outline: none; flex: 1; min-width: 120px; padding: 4px 0;
}
#note-title-inp::placeholder { color: var(--text-3); }
.tb-sep { width: 1px; height: 18px; background: var(--border); margin: 0 6px; flex-shrink: 0; }
.tb-btn {
  background: none; border: none; color: var(--text-2); width: 28px; height: 28px;
  border-radius: 5px; cursor: pointer; font-family: var(--mono); font-size: 12px;
  display: flex; align-items: center; justify-content: center; transition: all .12s; flex-shrink: 0;
}
.tb-btn:hover { background: var(--surface2); color: var(--text); }
.toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.save-indicator { font-size: 11px; color: var(--text-3); transition: color .2s; }
.save-indicator.saving { color: var(--accent); }
.save-indicator.saved  { color: var(--green); }
.save-indicator.error  { color: var(--red); }
.btn-share-note {
  background: none; border: 1px solid var(--border2); color: var(--text-2);
  border-radius: 7px; padding: 5px 12px; font-family: var(--mono); font-size: 12px;
  cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px;
}
.btn-share-note:hover { border-color: var(--accent); color: var(--accent); }

/* EDITOR CONTENT */
#editor-wrap { flex: 1; overflow-y: auto; padding: 40px 64px; }
#editor {
  max-width: 720px; margin: 0 auto; min-height: calc(100vh - 200px);
  outline: none; color: var(--text); font-family: var(--mono); font-size: 14px;
  line-height: 1.85; caret-color: var(--accent);
}
#editor:empty::before { content: 'Bắt đầu ghi chú...'; color: var(--text-3); pointer-events: none; }
#editor h1 { font-family: var(--serif); font-size: 26px; font-weight: 300; margin: 20px 0 10px; line-height: 1.3; }
#editor h2 { font-family: var(--serif); font-size: 20px; font-weight: 300; margin: 16px 0 8px; }
#editor h3 { font-family: var(--serif); font-size: 16px; font-weight: 600; margin: 14px 0 6px; }
#editor ul, #editor ol { padding-left: 24px; margin: 6px 0; }
#editor li { margin: 3px 0; }
#editor strong { font-weight: 600; }
#editor em { font-style: italic; color: var(--text-2); }
#editor a { color: var(--accent); text-decoration: none; }
#editor a:hover { text-decoration: underline; }
#editor blockquote { border-left: 2px solid var(--accent); margin: 10px 0; padding: 6px 18px; color: var(--text-2); font-style: italic; }
#editor code { background: var(--surface2); padding: 2px 7px; border-radius: 4px; font-size: 13px; color: var(--amber); }
#editor hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
#editor img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); margin: 10px 0; display: block; }
.img-uploading {
  display: inline-block; background: var(--surface2); border: 1px dashed var(--border2);
  border-radius: 8px; padding: 12px 20px; color: var(--text-3); font-size: 12px; margin: 6px 0;
}

/* SHARE MODAL */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(6px);
  z-index: 500; display: none; align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 14px;
  padding: 28px; width: 440px; display: flex; flex-direction: column; gap: 18px;
  animation: fadeUp .2s ease; box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.modal-title { font-size: 15px; font-weight: 500; }
.modal-desc { font-size: 12px; color: var(--text-2); line-height: 1.7; }
.perm-row { display: flex; gap: 8px; }
.perm-opt {
  flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px; text-align: center; cursor: pointer; font-family: var(--mono);
  font-size: 12px; color: var(--text-2); transition: all .15s;
}
.perm-opt.sel { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.link-row { display: flex; gap: 8px; }
.link-row input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; padding: 9px 12px; color: var(--text-2); font-family: var(--mono); font-size: 11px; outline: none;
}
.btn-copy {
  background: var(--accent); border: none; color: #fff; border-radius: 7px;
  padding: 9px 16px; font-family: var(--mono); font-size: 12px; cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.btn-copy:hover { opacity: .85; }
.btn-copy.ok { background: var(--green); color: #000; }
.modal-foot { display: flex; justify-content: flex-end; }
.btn-ghost {
  background: none; border: 1px solid var(--border); color: var(--text-2);
  border-radius: 7px; padding: 7px 16px; font-family: var(--mono); font-size: 12px;
  cursor: pointer; transition: all .15s;
}
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }

/* TOAST */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
  padding: 9px 18px; border-radius: 8px; font-size: 12px;
  opacity: 0; pointer-events: none; transition: all .22s; z-index: 9999; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* SPINNER */
.spin {
  width: 16px; height: 16px; border: 2px solid var(--border2);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .6s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* RENDERED (share view) */
.rendered { font-family: var(--mono); font-size: 14px; line-height: 1.85; color: var(--text); }
.rendered h1 { font-family: var(--serif); font-size: 28px; font-weight: 300; margin-bottom: 16px; }
.rendered h2 { font-family: var(--serif); font-size: 21px; font-weight: 300; margin: 18px 0 8px; }
.rendered img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); margin: 10px 0; display: block; }
.rendered blockquote { border-left: 2px solid var(--accent); padding: 6px 18px; color: var(--text-2); font-style: italic; margin: 10px 0; }
.rendered code { background: var(--surface2); padding: 2px 7px; border-radius: 4px; color: var(--amber); }
.rendered a { color: var(--accent); }
.rendered ul, .rendered ol { padding-left: 24px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-header">
      <div class="login-logo">Git<em>Note</em></div>
      <div class="login-sub">// personal notepad</div>
    </div>
    <div class="login-card">
      <div class="field">
        <label>Tài khoản</label>
        <input id="inp-user" type="text" placeholder="admin" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Mật khẩu</label>
        <input id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="btn-login">Đăng nhập</button>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>
</div>

<!-- SHARE SCREEN -->
<div id="share-screen">
  <div class="share-bar">
    <div class="share-logo">GitNote</div>
    <div class="share-pill" id="share-pill">👁 Chỉ xem</div>
  </div>
  <div class="share-body" id="share-body"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">GitNote</div>
    <button class="icon-btn danger" id="btn-logout">↩ Đăng xuất</button>
  </div>
  <div class="workspace">
    <div id="sidebar">
      <div class="sidebar-top">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input id="search-inp" type="text" placeholder="Tìm kiếm..."/>
        </div>
        <button class="btn-new-note" id="btn-new" title="Tạo ghi chú mới">+</button>
      </div>
      <div id="note-list"></div>
    </div>
    <div id="editor-area">
      <div id="empty-state">
        <div class="empty-glyph">∅</div>
        <div class="empty-hint">Chọn hoặc tạo ghi chú mới</div>
      </div>
      <div id="editor-panel">
        <div class="toolbar">
          <input id="note-title-inp" placeholder="Tiêu đề..."/>
          <div class="tb-sep"></div>
          <button class="tb-btn" data-cmd="bold"                title="Bold"><b>B</b></button>
          <button class="tb-btn" data-cmd="italic"              title="Italic"><i>I</i></button>
          <button class="tb-btn" data-cmd="underline"           title="Underline"><u style="text-underline-offset:2px">U</u></button>
          <div class="tb-sep"></div>
          <button class="tb-btn" data-cmd="h1"                  title="Heading 1">H1</button>
          <button class="tb-btn" data-cmd="h2"                  title="Heading 2">H2</button>
          <button class="tb-btn" data-cmd="h3"                  title="Heading 3">H3</button>
          <div class="tb-sep"></div>
          <button class="tb-btn" data-cmd="insertUnorderedList" title="Bullet">•≡</button>
          <button class="tb-btn" data-cmd="insertOrderedList"   title="Numbered">1≡</button>
          <button class="tb-btn" data-cmd="blockquote"          title="Blockquote">❝</button>
          <button class="tb-btn" data-cmd="link"                title="Link">↗</button>
          <div class="toolbar-right">
            <span class="save-indicator" id="save-ind"></span>
            <button class="btn-share-note" id="btn-share">⤤ Chia sẻ</button>
          </div>
        </div>
        <div id="editor-wrap">
          <div id="editor" contenteditable="true" spellcheck="false"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="overlay" id="share-overlay">
  <div class="modal">
    <div class="modal-title">⤤ Chia sẻ ghi chú</div>
    <div class="modal-desc">Tạo link chia sẻ. Người nhận chỉ thấy đúng ghi chú này, không thấy danh sách.</div>
    <div class="perm-row">
      <div class="perm-opt sel" data-perm="view">👁 Chỉ xem</div>
      <div class="perm-opt"     data-perm="edit">✏️ Có thể sửa</div>
    </div>
    <div class="field" style="margin-top:10px">
      <label>Đường dẫn tùy chỉnh (Slug)</label>
      <input id="share-slug-inp" type="text" placeholder="vi-du: ghi-chu-quan-trong" style="background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; width: 100%;"/>
    </div>
    <div class="link-row">
      <input id="share-link" type="text" readonly placeholder="Đang tạo link..."/>
      <button class="btn-copy" id="btn-copy">Sao chép</button>
      <button class="btn-primary" id="btn-save-share" style="margin-top:5px">Cập nhật link</button>
      <div class="modal-foot">
      <button class="btn-ghost" id="btn-modal-close">Đóng</button>
    </div>
    </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// CONFIG
const API = 'https://script.google.com/macros/s/AKfycbzhzQ7O9sZE2J400wf8ILgAal81PsA2p6sSIdfyWuqho8upbWPiOh5VyprHuxD2tvoE/exec';

// API CALL
async function api(payload) {
  const res = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
  const data = await res.json();
  if (data && data.error) throw new Error(data.error);
  return data;
}

// SHA256


// TOAST
let _tt;
function toast(msg, dur=2400) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), dur);
}

// ESC HTML
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// STATE
let notes = [], current = null, saveTimer = null, sharePerm = 'view', shareGen = false;

// SHARE MODE
async function checkShareMode() {
const token = new URLSearchParams(location.search).get('n'); // Đổi thành 'n' cho ngắn
  if (!token) return false;
  document.getElementById('login-screen').style.display = 'none';
  const screen = document.getElementById('share-screen');
  screen.style.display = 'flex';
  document.getElementById('share-body').innerHTML = '<div style="padding:48px;text-align:center"><div class="spin" style="margin:auto"></div></div>';
  try {
    const note = await api({ action: 'getByToken', token });
    if (note.error || !note.id) {
      document.getElementById('share-body').innerHTML = '<p style="color:var(--text-3);padding:40px 0">Link không hợp lệ hoặc đã hết hạn.</p>';
      return true;
    }
    const pill = document.getElementById('share-pill');
    if (note.share_perm === 'edit') { pill.textContent = '✏️ Có thể sửa'; pill.classList.add('edit'); }
    const body = document.getElementById('share-body');
    if (note.share_perm === 'view') {
      body.innerHTML = `<h1 style="font-family:var(--serif);font-size:28px;font-weight:300;margin-bottom:24px">${esc(note.title)}</h1><div class="rendered">${note.content||''}</div>`;
    } else {
      body.innerHTML = `
        <input id="s-title" value="${esc(note.title)}" style="width:100%;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--serif);font-size:26px;font-weight:300;padding:0 0 14px;outline:none;margin-bottom:24px"/>
        <div id="s-editor" contenteditable="true" style="outline:none;font-family:var(--mono);font-size:14px;line-height:1.85;min-height:400px;color:var(--text)"></div>
        <div style="margin-top:20px;display:flex;align-items:center;gap:12px">
          <button id="s-save" style="background:var(--accent);border:none;color:#fff;border-radius:8px;padding:10px 24px;font-family:var(--mono);font-size:13px;cursor:pointer">Lưu thay đổi</button>
          <span id="s-st" style="font-size:12px;color:var(--text-3)"></span>
        </div>`;
      const ed = document.getElementById('s-editor');
      ed.innerHTML = note.content || '';
      setupPaste(ed);
      document.getElementById('s-save').onclick = async () => {
        const st = document.getElementById('s-st');
        st.textContent = 'Đang lưu...';
        try {
          await api({ action: 'updateNote', id: note.id, title: document.getElementById('s-title').value, content: ed.innerHTML });
          st.textContent = '✓ Đã lưu';
        } catch(e) { st.textContent = 'Lỗi: ' + e.message; }
      };
    }
  } catch(e) {
    document.getElementById('share-body').innerHTML = `<p style="color:var(--red);padding:40px 0">Lỗi: ${esc(e.message)}</p>`;
  }
  return true;
}

// LOGIN
// LOGIN
async function doLogin() {
  const user  = document.getElementById('inp-user').value.trim();
  const pass  = document.getElementById('inp-pass').value; // Lấy mật khẩu gốc
  const errEl = document.getElementById('login-err');
  const btn   = document.getElementById('btn-login');
  
  if (!user || !pass) { errEl.textContent = 'Vui lòng nhập đầy đủ.'; return; }
  
  btn.textContent = 'Đang xác thực...'; btn.disabled = true; errEl.textContent = '';
  
  try {
    // Gửi trực tiếp pass lên server, KHÔNG dùng biến hash nữa
    const res = await api({ action: 'login', username: user, passwordHash: pass });
    
    if (!res.success) {
      errEl.textContent = 'Sai tài khoản hoặc mật khẩu.';
      btn.textContent = 'Đăng nhập'; btn.disabled = false; return;
    }
    
    sessionStorage.setItem('gn_auth', '1');
    showApp();
  } catch(e) {
    errEl.textContent = 'Lỗi kết nối: ' + e.message;
    btn.textContent = 'Đăng nhập'; btn.disabled = false;
  }
}

document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('inp-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('inp-user').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('inp-pass').focus(); });

// SHOW APP
async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  await loadNotes();
}

// LOAD NOTES
async function loadNotes() {
  const list = document.getElementById('note-list');
  list.innerHTML = '<div style="padding:32px;text-align:center"><div class="spin" style="margin:auto"></div></div>';
  try {
    const data = await api({ action: 'getNotes' });
    notes = Array.isArray(data) ? data : [];
    notes.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
    renderList();
  } catch(e) {
    list.innerHTML = `<div class="list-empty" style="color:var(--red)">Lỗi tải:<br>${esc(e.message)}</div>`;
  }
}

// RENDER LIST
function renderList(filter='') {
  const list = document.getElementById('note-list');
  const q = (filter||'').toLowerCase();
  const filtered = notes.filter(n => (n.title||'').toLowerCase().includes(q));
  if (!filtered.length) {
    list.innerHTML = `<div class="list-empty">Không có ghi chú${filter?' phù hợp':''}</div>`;
    return;
  }
  list.innerHTML = '';
  filtered.forEach(n => {
    const d = new Date(n.updated_at);
    const ds = d.toLocaleDateString('vi-VN', {day:'2-digit',month:'2-digit',year:'numeric'});
    const div = document.createElement('div');
    div.className = 'note-item' + (current && current.id === n.id ? ' active' : '');
    div.dataset.id = n.id;
    div.innerHTML = `
      <div class="note-item-info">
        <div class="note-title">${esc(n.title||'Không có tiêu đề')}</div>
        <div class="note-date">${ds}</div>
      </div>
      <button class="note-del" title="Xóa">✕</button>`;
    div.addEventListener('click', e => { if(e.target.classList.contains('note-del')) return; openNote(n); });
    div.querySelector('.note-del').addEventListener('click', e => { e.stopPropagation(); deleteNote(n); });
    list.appendChild(div);
  });
}

// OPEN NOTE
function openNote(n) {
  current = n;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('editor-panel').style.display = 'flex';
  document.getElementById('note-title-inp').value = n.title || '';
  document.getElementById('editor').innerHTML = n.content || '';
  setSaveInd('','');
  renderList(document.getElementById('search-inp').value);
}

// CREATE
document.getElementById('btn-new').addEventListener('click', async () => {
  const btn = document.getElementById('btn-new');
  btn.disabled = true;
  try {
    const res = await api({ action: 'createNote', title: 'Ghi chú mới', content: '' });
    const n = { id: res.id, title: 'Ghi chú mới', content: '', created_at: res.created_at, updated_at: res.created_at };
    notes.unshift(n);
    renderList(document.getElementById('search-inp').value);
    openNote(n);
    setTimeout(() => { const t = document.getElementById('note-title-inp'); t.focus(); t.select(); }, 50);
  } catch(e) { toast('Lỗi tạo ghi chú: ' + e.message); }
  btn.disabled = false;
});

// DELETE
async function deleteNote(n) {
  if (!confirm(`Xóa "${n.title}"?`)) return;
  try {
    await api({ action: 'deleteNote', id: n.id });
    notes = notes.filter(x => x.id !== n.id);
    if (current && current.id === n.id) {
      current = null;
      document.getElementById('editor-panel').style.display = 'none';
      document.getElementById('empty-state').style.display = 'flex';
    }
    renderList(document.getElementById('search-inp').value);
    toast('Đã xóa ghi chú');
  } catch(e) { toast('Lỗi xóa: ' + e.message); }
}

// SAVE
function setSaveInd(cls, txt) {
  const el = document.getElementById('save-ind');
  el.className = 'save-indicator' + (cls ? ' '+cls : '');
  el.textContent = txt;
}

function triggerSave() {
  if (!current) return;
  setSaveInd('saving', '● lưu...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const title   = document.getElementById('note-title-inp').value || 'Không có tiêu đề';
    const content = document.getElementById('editor').innerHTML;
    try {
      await api({ action: 'updateNote', id: current.id, title, content });
      current.title = title; current.content = content;
      current.updated_at = new Date().toISOString();
      const idx = notes.findIndex(n => n.id === current.id);
      if (idx !== -1) notes[idx] = {...notes[idx], title, content, updated_at: current.updated_at};
      notes.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
      renderList(document.getElementById('search-inp').value);
      setSaveInd('saved', '✓ đã lưu');
      setTimeout(() => setSaveInd('',''), 2500);
    } catch(e) { setSaveInd('error', '✕ lỗi lưu'); }
  }, 1000);
}

document.getElementById('note-title-inp').addEventListener('input', triggerSave);
document.getElementById('editor').addEventListener('input', triggerSave);

// TOOLBAR
document.querySelectorAll('.perm-opt').forEach(btn => {
  btn.addEventListener('click', async () => {
    document.querySelectorAll('.perm-opt').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    sharePerm = btn.dataset.perm;
    document.getElementById('share-link').value = 'Đang tạo link...';
    await genShareLink(true); // <-- Sửa ở đây: Thêm tham số true
  });
});
// PASTE IMAGE
function setupPaste(el) {
  el.addEventListener('paste', async e => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();
        const ph = document.createElement('div');
        ph.className = 'img-uploading';
        ph.textContent = '⏳ Đang tải ảnh lên Drive...';
        insertAtCursor(el, ph);
        try {
          const b64 = await blobToB64(blob);
          const pure = b64.split(',')[1];
          const res = await api({ action: 'uploadImage', base64: pure, mimeType: blob.type, filename: 'img_'+Date.now()+'.png' });
          const img = document.createElement('img');
          img.src = res.url;
          img.setAttribute('referrerpolicy', 'no-referrer');
          ph.replaceWith(img);
          toast('✓ Đã chèn ảnh');
        } catch(err) {
          ph.textContent = '✕ Lỗi tải ảnh: ' + err.message;
          toast('Lỗi ảnh: ' + err.message);
        }
        triggerSave();
        break;
      }
    }
  });
}

function blobToB64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

function insertAtCursor(el, node) {
  const sel = window.getSelection();
  if (sel && sel.rangeCount && el.contains(sel.getRangeAt(0).startContainer)) {
    const range = sel.getRangeAt(0);
    range.deleteContents(); range.insertNode(node);
    range.setStartAfter(node); range.collapse(true);
    sel.removeAllRanges(); sel.addRange(range);
  } else { el.appendChild(node); }
}

setupPaste(document.getElementById('editor'));

// ================= XỬ LÝ SHARE (TỐI ƯU UX & LOGIC) =================

// 1. Mở modal Share
document.getElementById('btn-share').addEventListener('click', async () => {
  if (!current) return;
  document.getElementById('share-overlay').classList.add('open');
  
  const slugInp = document.getElementById('share-slug-inp');
  const linkInp = document.getElementById('share-link');
  
  // Nếu note này đã từng share, hiển thị lại thông tin cũ (KHÔNG GỌI API)
  if (current.share_token) {
    sharePerm = current.share_perm || 'view';
    slugInp.value = current.share_token;
    linkInp.value = `${location.origin}${location.pathname}?n=${current.share_token}`;
    
    // Đổi màu nút quyền theo data đã lưu
    document.querySelectorAll('.perm-opt').forEach(b => {
      b.classList.toggle('sel', b.dataset.perm === sharePerm);
    });
  } else {
    // Nếu chưa từng share, tạo mới link mặc định (Chỉ xem)
    sharePerm = 'view';
    slugInp.value = "";
    linkInp.value = 'Đang tạo link...';
    
    document.querySelectorAll('.perm-opt').forEach(b => {
      b.classList.toggle('sel', b.dataset.perm === 'view');
    });
    await genShareLink(); 
  }
});

// 2. Đóng Modal
document.getElementById('btn-modal-close').addEventListener('click', () => {
  document.getElementById('share-overlay').classList.remove('open');
});

// 3. Chọn quyền (Chỉ đổi UI để người dùng chọn, KHÔNG tự động lưu)
document.querySelectorAll('.perm-opt').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.perm-opt').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    sharePerm = btn.dataset.perm; // Lưu trạng thái vào biến tạm
  });
});

// 4. Bấm nút "Cập nhật link" (Lúc này mới gọi API)
document.getElementById('btn-save-share').addEventListener('click', async () => {
  document.getElementById('share-link').value = 'Đang cập nhật...';
  await genShareLink();
});

// 5. Hàm gọi API
async function genShareLink() {
  if (!current) return;
  const slugInp = document.getElementById('share-slug-inp');
  
  try {
    const payload = { 
      action: 'createShare', 
      id: current.id, 
      perm: sharePerm,
      slug: slugInp.value.trim() 
    };
    
    const res = await api(payload);
    
    // Cập nhật lại data note hiện tại
    current.share_token = res.token;
    current.share_perm = sharePerm;
    if (res.token) slugInp.value = res.token; // Cập nhật lại ô slug nếu backend trả về
    
    const url = `${location.origin}${location.pathname}?n=${res.token}`;
    document.getElementById('share-link').value = url;
    toast('✓ Đã cập nhật link chia sẻ');
  } catch(e) {
    document.getElementById('share-link').value = 'Lỗi: ' + e.message;
  }
}

// 6. Nút Copy
document.getElementById('btn-copy').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('share-link').value).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✓ Đã sao chép'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Sao chép'; btn.classList.remove('ok'); }, 2000);
  });
});
// SEARCH
document.getElementById('search-inp').addEventListener('input', e => renderList(e.target.value));

// LOGOUT
document.getElementById('btn-logout').addEventListener('click', () => {
  sessionStorage.removeItem('gn_auth');
  location.reload();
});

// INIT
(async () => {
  const isShare = await checkShareMode();
  if (isShare) return;
  if (sessionStorage.getItem('gn_auth') === '1') showApp();
})();
</script>
